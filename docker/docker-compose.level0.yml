# Implementation guide: see docs/plans/LEVEL-0-DATA-PIPELINE.md — "Docker Setup"
# Level 0 infrastructure: PostgreSQL+PostGIS, MinIO, Redis, Tile API
# Verbatim from plan doc (docker-compose.level0.yml).

version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: sentinel_catalog
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"    # MinIO Console UI
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  tile-api:
    build:
      context: ..
      dockerfile: docker/data-pipeline.Dockerfile
    command: uvicorn data_pipeline.api:app --host 0.0.0.0 --port 8100 --reload
    ports:
      - "8100:8100"
    environment:
      DATABASE_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@postgres:5432/sentinel_catalog
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      REDIS_URL: redis://redis:6379
      CDSE_CLIENT_ID: ${CDSE_CLIENT_ID}
      CDSE_CLIENT_SECRET: ${CDSE_CLIENT_SECRET}
    volumes:
      - ../data-pipeline:/app/data-pipeline
      - ../shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
