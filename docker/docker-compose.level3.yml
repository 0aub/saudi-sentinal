# Implementation guide: see docs/plans/LEVEL-3-SYSTEM.md — "Docker Configuration"
# Level 3 System: API Gateway, React Frontend, Alert Worker
# Inherits all Level 0 + Level 2 services.
# Verbatim from plan doc (docker-compose.level3.yml).

services:
  # --- Inherits all Level 0 + Level 2 services ---
  # Run: docker compose -f docker-compose.level0.yml -f docker-compose.level2.yml \
  #                     -f docker-compose.level3.yml up -d

  api-gateway:
    build:
      context: ..
      dockerfile: docker/system.Dockerfile
    command: uvicorn system.api_gateway.main:app --host 0.0.0.0 --port 8300
    ports:
      - "8300:8300"
    environment:
      DATABASE_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@postgres:5432/sentinel_catalog
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MODEL_SERVER_URL: http://model-server:8200
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AIRFLOW_API_URL: http://airflow-webserver:8080
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ../system:/app/system
      - ../shared:/app/shared
    depends_on:
      - postgres
      - minio
      - redis
      - model-server

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: http://localhost:8300
        VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN}
    ports:
      - "3001:80"
    depends_on:
      - api-gateway

  alert-worker:
    build:
      context: ..
      dockerfile: docker/system.Dockerfile
    command: python system/alerts/worker.py
    environment:
      DATABASE_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@postgres:5432/sentinel_catalog
      REDIS_URL: redis://redis:6379
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO}
    volumes:
      - ../system:/app/system
      - ../shared:/app/shared
    depends_on:
      - postgres
      - redis
