# Implementation guide: see docs/plans/LEVEL-2-MLOPS.md — "docker-compose.level2.yml → prometheus"
# Prometheus configuration for Saudi Sentinel AI monitoring stack.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "tile-api"
    static_configs:
      - targets: ["tile-api:8100"]
    metrics_path: /metrics

  - job_name: "model-server"
    static_configs:
      - targets: ["model-server:8200"]
    metrics_path: /metrics

  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8300"]
    metrics_path: /metrics

  - job_name: "airflow-webserver"
    static_configs:
      - targets: ["airflow-webserver:8080"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "minio"
    static_configs:
      - targets: ["minio:9000"]
    metrics_path: /minio/v2/metrics/cluster

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Add alertmanager endpoint when configured
